name: "Build"
on:
  pull_request:
    branches:
      - master
      - development
  push:
    branches:
      - master
      - development
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Update version.dart from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/}
          sed -i "s/const String appVersion = \".*\";/const String appVersion = \"$TAG_VERSION\";/" lib/configs/version.dart
          echo "Updated version.dart to $TAG_VERSION"
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          version: '3.38.3'
          channel: 'stable'
          cache: false
      - name: 'Checkout Flutter 3.38.3'
        shell: bash
        run: |
          cd $FLUTTER_ROOT
          git fetch --tags
          git checkout 3.38.3
          flutter --version
          cd -
      - run: flutter --version
      - run: flutter pub get

      - name: Decode and Save Keystore
        run: echo "${{ secrets.APP_KEY }}" | base64 -d > android/app/keystore.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties

      - run: flutter build apk --release

      - name: Save Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-appbundle:
    name: Build Android AppBundle
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Update version.dart from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/}
          sed -i "s/const String appVersion = \".*\";/const String appVersion = \"$TAG_VERSION\";/" lib/configs/version.dart
          echo "Updated version.dart to $TAG_VERSION"
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          version: '3.38.3'
          channel: 'stable'
          cache: false
      - name: 'Checkout Flutter 3.38.3'
        shell: bash
        run: |
          cd $FLUTTER_ROOT
          git fetch --tags
          git checkout 3.38.3
          flutter --version
          cd -
      - run: flutter --version
      - run: flutter pub get

      - name: Decode and Save Keystore
        run: echo "${{ secrets.APP_KEY }}" | base64 -d > android/app/keystore.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties

      - name: Build AppBundle (disable GitHub updates)
        run: flutter build appbundle --release --dart-define=CHECK_GITHUB_UPDATES=false

      - name: Save AppBundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-appbundle
          path: build/app/outputs/bundle/release/app-release.aab

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Update version.dart from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/}
          sed -i "s/const String appVersion = \".*\";/const String appVersion = \"$TAG_VERSION\";/" lib/configs/version.dart
          echo "Updated version.dart to $TAG_VERSION"
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          version: '3.38.3'
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Download sqlite.dll
        run: |
          Invoke-WebRequest -Uri "https://www.sqlite.org/2025/sqlite-dll-win-x64-3500100.zip" -OutFile "sqlite.zip"
          Expand-Archive -Path sqlite.zip -DestinationPath sqlite
          Copy-Item -Path ".\sqlite\sqlite3.dll" -Destination ".\build\windows\x64\runner\Release\sqlite3.dll" -Force

      - name: Zip Windows Build
        run: |
          $outputPath = "build\windows\x64\runner\Release"
          Compress-Archive -Path "$outputPath\*" -DestinationPath "bonodnd-windows.zip" -Force

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: bonodnd-windows.zip

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Update version.dart from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/}
          sed -i "s/const String appVersion = \".*\";/const String appVersion = \"$TAG_VERSION\";/" lib/configs/version.dart
          echo "Updated version.dart to $TAG_VERSION"
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          version: '3.38.3'
          channel: 'stable'
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libsqlite3-0

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Download appimagetool
        run: |
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Create AppImage structure
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/lib
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/

          # Copy sqlite3 library
          cp /usr/lib/x86_64-linux-gnu/libsqlite3.so.0* AppDir/usr/lib/

          # Create symlink for libsqlite3.so
          ln -s libsqlite3.so.0 AppDir/usr/lib/libsqlite3.so

          # Create .desktop file
          cat > AppDir/bonodnd.desktop << 'EOF'
          [Desktop Entry]
          Name=BonoDND
          Exec=dnd
          Icon=bonodnd
          Type=Application
          Categories=Utility;Game;
          EOF

          # Copy icon (adjust path if your icon is elsewhere)
          if [ -f assets/icon/icon.png ]; then
            cp assets/icon/icon.png AppDir/bonodnd.png
          fi

          # Create AppRun
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          APPDIR="$(dirname "$(readlink -f "$0")")"
          export LD_LIBRARY_PATH="$APPDIR/usr/lib:$APPDIR/usr/bin/lib:$LD_LIBRARY_PATH"
          exec "$APPDIR/usr/bin/dnd" "$@"
          EOF
          chmod +x AppDir/AppRun

      - name: Build AppImage
        run: |
          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir bonodnd-x86_64.AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"

      - name: Zip Linux Build (fallback)
        run: |
          cd build/linux/x64/release/bundle
          zip -r ../../../../../bonodnd-linux.zip .

      - name: Upload AppImage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-appimage
          path: bonodnd-x86_64.AppImage

      - name: Upload Linux Zip Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: bonodnd-linux.zip
