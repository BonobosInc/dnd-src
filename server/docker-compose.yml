version: '3.8'

services:
  dnd-server:
    build: .
    container_name: dnd-session-server
    ports:
      - "31333:31333"
    environment:
      - PYTHONUNBUFFERED=1
      - SERVER_PORT=31333
    restart: unless-stopped
    networks:
      - dnd-network

networks:
  dnd-network:
    driver: bridge
