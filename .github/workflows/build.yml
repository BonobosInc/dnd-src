name: "Build"
on:
  pull_request:
    branches:
      - master
      - development
  push:
    branches:
      - master
      - development

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          version: '3.38.3'
          channel: 'stable'
          cache: false
      - name: 'Checkout Flutter 3.38.3'
        shell: bash
        run: |
          cd $FLUTTER_ROOT
          git fetch --tags
          git checkout 3.38.3
          flutter --version
          cd -
      - run: flutter --version
      - run: flutter pub get

      - name: Decode and Save Keystore
        run: echo "${{ secrets.APP_KEY }}" | base64 -d > android/app/keystore.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties

      - run: flutter build apk --release

      - name: Save Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          version: '3.38.3'
          channel: 'stable'

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows

      - name: Download sqlite.dll
        run: |
          Invoke-WebRequest -Uri "https://www.sqlite.org/2025/sqlite-dll-win-x64-3500100.zip" -OutFile "sqlite.zip"
          Expand-Archive -Path sqlite.zip -DestinationPath sqlite
          Copy-Item -Path ".\sqlite\sqlite3.dll" -Destination ".\build\windows\x64\runner\Release\sqlite3.dll" -Force
      - name: Zip Windows Build
        run: |
          $outputPath = "build\windows\x64\runner\Release"
          Compress-Archive -Path "$outputPath\*" -DestinationPath "bonodnd-windows.zip" -Force

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: bonodnd-windows.zip

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          version: '3.38.3'
          channel: 'stable'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux

      - name: Zip Linux Build
        run: |
          cd build/linux/x64/release/bundle
          zip -r ../../../../../bonodnd-linux.zip .

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: bonodnd-linux.zip
